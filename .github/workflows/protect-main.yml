name: Protect main from direct pushes

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  check-direct-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push came from a PR merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass commit message via env so it can't be interpreted as a shell
          # expansion by the `run` step (command-injection hardening).
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          PUSHER: ${{ github.actor }}
        run: |
          set -u

          # Layer 1: commit-message pattern against the SUBJECT LINE ONLY.
          # github.event.head_commit.message is the full multi-line message
          # (subject + body). Bash regex `$` anchors end-of-string, so we
          # must isolate line 1 before matching. GitHub auto-titles squash
          # merges as "...(#N)" and merge commits as "Merge pull request #N".
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n 1)
          echo "Commit subject: $SUBJECT"
          if [[ "$SUBJECT" =~ \(#[0-9]+\)$ ]] \
             || [[ "$SUBJECT" =~ ^Merge\ pull\ request\ \#[0-9]+ ]]; then
            echo "Commit subject indicates PR merge — all good"
            exit 0
          fi

          # Layer 2: API lookup with retry. Handles rebase-merge and any
          # edge case where the title convention doesn't apply. GitHub's
          # commit->PR linking can lag >10s after a squash merge, so
          # retry up to 6 times over 30s before giving up.
          for attempt in 1 2 3 4 5 6; do
            PR_COUNT=$(gh api "repos/$REPO/commits/$COMMIT_SHA/pulls" \
              --jq 'length' 2>/dev/null || echo 0)
            if [ "$PR_COUNT" -gt 0 ]; then
              echo "API confirms PR association (attempt $attempt) — all good"
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              sleep 5
            fi
          done

          # Layer 3: no PR found by either signal — genuine direct push.
          echo "::warning::Direct push to main by $PUSHER (no associated PR)"
          gh issue create \
            --repo "$REPO" \
            --title "Direct push to main by $PUSHER" \
            --body "Commit \`$COMMIT_SHA\` was pushed directly to main without a PR.

            **Pusher:** $PUSHER
            **Commit:** https://github.com/$REPO/commit/$COMMIT_SHA

            Please use pull requests for all changes to main."
